<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bite &amp; Sip | Home</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="./js/main.js" type="module"></script>
  </head>

  <body
    class="bg-surface text-on-background font-body selection:bg-primary-container selection:text-on-primary-container"
  >
    <main class="pt-24 pb-16 px-6 max-w-7xl mx-auto space-y-24">
      <section class="relative group" id="hero">
        <div
          class="relative h-150 w-full rounded-[2.5rem] overflow-hidden bg-surface-container-low shadow-2xl transition-all duration-500 hover:scale-[1.01]"
        >
          <div
            class="absolute inset-0 bg-surface-container-highest animate-pulse"
          ></div>
          <img
            alt="Random Drink Recommendation"
            class="absolute inset-0 w-full h-full object-cover transition-all duration-700"
            data-alt="Close-up of a vibrant cocktail with fresh mint and berries on a dark marble bar top, warm golden backlighting, cinematic atmosphere"
          />
          <div
            class="absolute inset-0 bg-linear-to-t from-surface via-surface/40 to-transparent"
          ></div>
          <div class="absolute bottom-0 left-0 p-12 w-full md:w-2/3">
            <div
              class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-primary-container text-on-primary-container text-xs font-bold tracking-widest uppercase mb-6"
            >
              <span
                class="material-symbols-outlined text-sm"
                data-icon="auto_awesome"
                >auto_awesome</span
              >
              Tonight's recommendation
            </div>
            <h1
              class="text-6xl md:text-8xl font-headline font-black text-on-surface mb-8 tracking-tighter leading-none"
            >
              <span
                class="block h-16 md:h-24 bg-surface-container-highest/60 rounded-xl w-64 mb-3 animate-pulse"
              ></span>
              <span
                class="block h-16 md:h-24 bg-surface-container-highest/60 rounded-xl w-80 animate-pulse"
              ></span>
            </h1>
            <p
              class="text-xl text-on-surface-variant max-w-lg mb-10 leading-relaxed font-light"
            >
              <span class="block animate-pulse space-y-3">
                <span
                  class="block h-5 bg-surface-container-highest/60 rounded w-full"
                ></span>
                <span
                  class="block h-5 bg-surface-container-highest/60 rounded w-5/6"
                ></span>
                <span
                  class="block h-5 bg-surface-container-highest/60 rounded w-4/6"
                ></span>
              </span>
            </p>
            <a
              href="#"
              id="preparation-details"
              class="px-8 py-4 rounded-full bg-linear-to-r from-primary-container to-primary text-on-primary font-bold text-lg hover:shadow-[0_0_20px_rgba(255,81,106,0.4)] transition-all active:scale-95"
            >
              See preparation details
            </a>
          </div>
        </div>
      </section>
      <!-- Culinary Fact -->
      <section id="culinary-fact">
        <div
          class="flex items-start gap-5 px-8 py-6 bg-surface-container rounded-2xl ghost-border"
        >
          <span
            class="material-symbols-outlined text-primary text-3xl shrink-0 mt-0.5"
            >menu_book</span
          >
          <div>
            <span
              class="text-xs font-bold text-primary tracking-widest uppercase"
              >Culinary Lore</span
            >
            <p
              id="culinary-fact-text"
              class="text-on-surface-variant text-sm leading-relaxed mt-2"
            >
              <span class="block animate-pulse space-y-2">
                <span
                  class="block h-4 bg-surface-container-highest rounded w-full"
                ></span>
                <span
                  class="block h-4 bg-surface-container-highest rounded w-4/5"
                ></span>
              </span>
            </p>
          </div>
        </div>
      </section>
      <!-- Top Categories -->
      <section>
        <div class="flex justify-between items-end mb-12">
          <div>
            <span
              class="label-md font-label font-bold text-primary tracking-[0.2em] uppercase"
              >Browse by</span
            >
            <h2
              class="text-4xl font-headline font-extrabold text-on-surface mt-2"
            >
              Top Categories
            </h2>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="category-list">
          <div
            class="h-80 rounded-4xl bg-surface-container-low ghost-border p-8 flex flex-col justify-end relative animate-pulse"
          >
            <div
              class="w-4/5 h-32 bg-surface-container-highest rounded-4xl absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
            ></div>
            <div class="h-7 bg-surface-container-highest rounded w-2/3"></div>
          </div>
          <div
            class="h-80 rounded-4xl bg-surface-container-low ghost-border p-8 flex flex-col justify-end relative animate-pulse"
          >
            <div
              class="w-4/5 h-32 bg-surface-container-highest rounded-4xl absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
            ></div>
            <div class="h-7 bg-surface-container-highest rounded w-3/4"></div>
          </div>
          <div
            class="h-80 rounded-4xl bg-surface-container-low ghost-border p-8 flex flex-col justify-end relative animate-pulse"
          >
            <div
              class="w-4/5 h-32 bg-surface-container-highest rounded-4xl absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
            ></div>
            <div class="h-7 bg-surface-container-highest rounded w-1/2"></div>
          </div>
        </div>
      </section>
      <!-- Top Meals -->
      <section>
        <div class="flex justify-between items-end mb-12">
          <div>
            <span
              class="label-md font-label font-bold text-primary tracking-[0.2em] uppercase"
              >The Classics</span
            >
            <h2
              class="text-4xl font-headline font-extrabold text-on-surface mt-2"
            >
              Signature Selections
            </h2>
          </div>
          <a
            class="px-6 py-2 rounded-full border border-primary/20 text-primary font-label font-semibold hover:bg-primary/5 transition-all"
            href="#"
            id="load-more-meals"
          >
            List more meals
          </a>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10" id="meal-list">
          <div class="group animate-pulse">
            <div
              class="relative aspect-3/4 rounded-4xl overflow-hidden mb-6 ghost-border bg-surface-container-highest"
            ></div>
            <div
              class="h-7 bg-surface-container-highest rounded w-3/4 mb-3"
            ></div>
            <div
              class="h-4 bg-surface-container-highest rounded w-full mb-1"
            ></div>
            <div class="h-4 bg-surface-container-highest rounded w-5/6"></div>
          </div>
          <div class="group animate-pulse">
            <div
              class="relative aspect-3/4 rounded-4xl overflow-hidden mb-6 ghost-border bg-surface-container-highest"
            ></div>
            <div
              class="h-7 bg-surface-container-highest rounded w-2/3 mb-3"
            ></div>
            <div
              class="h-4 bg-surface-container-highest rounded w-full mb-1"
            ></div>
            <div class="h-4 bg-surface-container-highest rounded w-4/6"></div>
          </div>
          <div class="group animate-pulse">
            <div
              class="relative aspect-3/4 rounded-4xl overflow-hidden mb-6 ghost-border bg-surface-container-highest"
            ></div>
            <div
              class="h-7 bg-surface-container-highest rounded w-3/5 mb-3"
            ></div>
            <div
              class="h-4 bg-surface-container-highest rounded w-full mb-1"
            ></div>
            <div class="h-4 bg-surface-container-highest rounded w-5/6"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
