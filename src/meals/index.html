  <body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
    <main class="pt-24 pb-16 px-6 max-w-7xl mx-auto space-y-24">

          <span class="block h-16 md:h-20 bg-surface-container-highest/60 rounded-2xl w-72 mb-3 animate-pulse"></span>
