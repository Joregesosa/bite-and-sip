<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="author" content="joregesosa" />
    <meta
      name="description"
      content="Your curated collection of favorite meals. Explore and revisit the dishes you love most on Bite &amp; Sip."
    />
    <meta
      name="keywords"
      content="favorites, meals, food, recipes, bite and sip"
    />
    <!-- Open Graph -->
    <meta property="og:title" content="Bite &amp; Sip | Favorites" />
    <meta
      property="og:description"
      content="Your curated collection of favorite meals on Bite &amp; Sip."
    />
    <meta property="og:type" content="website" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&amp;family=Inter:wght@100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="../js/favorites.js" type="module"></script>
    <title>Bite &amp; Sip | Favorites</title>
  </head>
  <body
    class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container"
  >
    <main class="pt-24 pb-32 px-6 max-w-7xl mx-auto">
      <!-- Hero Title -->
      <section class="mb-12">
        <h1
          class="font-headline text-5xl md:text-7xl font-bold tracking-tighter text-on-surface mb-4"
        >
          Curated
          <span
            class="text-transparent bg-clip-text bg-linear-to-r from-primary-container to-primary"
            >Collections</span
          >
        </h1>
        <p class="text-on-surface-variant max-w-2xl text-lg leading-relaxed">
          Journey through our meticulously selected archives of gourmet cuisine.
        </p>
      </section>

      <section class="mb-16">
        <div class="flex items-end justify-between mb-8">
          <div>
            <span
              class="font-label text-xs font-bold uppercase tracking-[0.2em] text-primary block mb-2"
              >The Menu</span
            >
            <h2
              class="font-headline text-3xl font-bold tracking-tight text-on-surface"
            >
              Culinary Explorations
            </h2>
          </div>
          <div class="h-px grow mx-8 mb-3 bg-primary/20 hidden md:block"></div>
        </div>
        <div
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
          id="meal-list"
        >
          <!-- Skeleton Card -->
          <article
            class="bg-surface-container-high rounded-xl overflow-hidden ghost-border flex flex-col animate-pulse"
          >
            <div class="h-64 bg-surface-container-highest"></div>
            <div class="p-8 flex flex-col grow gap-4">
              <div class="h-7 bg-surface-container-highest rounded w-3/4"></div>
              <div class="mt-auto flex items-center justify-between">
                <div
                  class="h-4 bg-surface-container-highest rounded w-16"
                ></div>
                <div
                  class="h-4 bg-surface-container-highest rounded w-24"
                ></div>
              </div>
            </div>
          </article>
          <!-- Skeleton Card -->
          <article
            class="bg-surface-container-high rounded-xl overflow-hidden ghost-border flex flex-col animate-pulse"
          >
            <div class="h-64 bg-surface-container-highest"></div>
            <div class="p-8 flex flex-col grow gap-4">
              <div class="h-7 bg-surface-container-highest rounded w-2/3"></div>
              <div class="mt-auto flex items-center justify-between">
                <div
                  class="h-4 bg-surface-container-highest rounded w-16"
                ></div>
                <div
                  class="h-4 bg-surface-container-highest rounded w-24"
                ></div>
              </div>
            </div>
          </article>
          <!-- Skeleton Card -->
          <article
            class="bg-surface-container-high rounded-xl overflow-hidden ghost-border flex flex-col animate-pulse"
          >
            <div class="h-64 bg-surface-container-highest"></div>
            <div class="p-8 flex flex-col grow gap-4">
              <div class="h-7 bg-surface-container-highest rounded w-4/5"></div>
              <div class="mt-auto flex items-center justify-between">
                <div
                  class="h-4 bg-surface-container-highest rounded w-16"
                ></div>
                <div
                  class="h-4 bg-surface-container-highest rounded w-24"
                ></div>
              </div>
            </div>
          </article>
          <!-- Skeleton Card -->
          <article
            class="bg-surface-container-high rounded-xl overflow-hidden ghost-border flex flex-col animate-pulse"
          >
            <div class="h-64 bg-surface-container-highest"></div>
            <div class="p-8 flex flex-col grow gap-4">
              <div class="h-7 bg-surface-container-highest rounded w-3/5"></div>
              <div class="mt-auto flex items-center justify-between">
                <div
                  class="h-4 bg-surface-container-highest rounded w-16"
                ></div>
                <div
                  class="h-4 bg-surface-container-highest rounded w-24"
                ></div>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
